<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BOE Analytics</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    body { font-family: "Segoe UI", sans-serif; margin: 0; padding: 14px; color: #1c2733; }
    h2 { color: #16324f; margin: 0 0 4px; font-size: 18px; }
    .muted { color: #5b6b7b; font-size: 12px; }
    label { display: block; margin: 10px 0 3px; font-size: 12px; font-weight: 600; }
    input, select { width: 100%; padding: 7px 9px; box-sizing: border-box; border: 1px solid #dde3ea; border-radius: 4px; font-size: 13px; }
    button { background: #16324f; color: #fff; border: none; border-radius: 4px; padding: 9px 14px; font-size: 13px; cursor: pointer; margin-top: 10px; width: 100%; }
    button:hover { background: #0d2136; }
    button.secondary { background: #fff; color: #16324f; border: 1px solid #16324f; }
    #status { margin-top: 10px; font-size: 12px; min-height: 16px; }
    #status.err { color: #b00020; }
    #status.ok { color: #1a7f37; }
    .hint { background: #f2f6fa; border-radius: 4px; padding: 8px 10px; font-size: 11.5px; margin-top: 14px; line-height: 1.5; }
    code { font-size: 11px; }
  </style>
</head>
<body>
  <h2>BOE Analytics</h2>
  <div class="muted">Speed to Conviction — SEC data, straight into your sheet</div>

  <label for="api">Backend URL</label>
  <input id="api" value="https://localhost:8443" />

  <label for="apikey">API key <span class="muted">(leave blank if the backend doesn't require one)</span></label>
  <input id="apikey" type="password" placeholder="boe_…" autocomplete="off" />

  <label for="ticker">Company</label>
  <select id="ticker"><option>Loading…</option></select>

  <label for="period">Period</label>
  <select id="period">
    <option value="annual">Annual (FY)</option>
    <option value="quarterly">Quarterly</option>
  </select>

  <button id="insert">Insert model at selection</button>
  <button id="refresh" class="secondary">Refresh BOE formulas</button>
  <div id="status"></div>

  <div class="hint">
    Custom formula: <code>=BOE.VALUE("AAPL","revenue",2024,"FY")</code><br/>
    Concepts: revenue, gross_profit, operating_income, net_income,
    eps_diluted, operating_cash_flow, capex, total_assets, and more —
    see the API docs.
  </div>

  <script src="taskpane.js"></script>
</body>
</html>
